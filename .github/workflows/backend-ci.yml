name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sapphire_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sapphire_test
      
      - name: Type check
        working-directory: backend
        run: npm run typecheck
      
      - name: Lint
        working-directory: backend
        run: npm run lint || true  # Allow lint failures for now
      
      - name: Run unit tests
        working-directory: backend
        run: npm test -- --reporter=verbose
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sapphire_test
          JWT_SECRET: test-secret-min-32-chars-long-xxxxx
          PII_ENCRYPTION_KEY: test-pii-key-min-32-chars-long-xxx
          NODE_ENV: test
      
      - name: Build
        working-directory: backend
        run: npm run build
