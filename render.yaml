services:
  - type: web
    name: sapphire-backend-staging
    env: node
    plan: starter
    region: frankfurt
    branch: main
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '5000'
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: PII_ENCRYPTION_SALT
        generateValue: true
      - key: CORS_ORIGIN
        value: https://sapphire-staging.vercel.app
      - key: APP_URL
        value: https://sapphire-backend-staging.onrender.com
      - key: MARKETING_URL
        value: https://sapphire-staging.vercel.app
      - key: STRIPE_API_VERSION
        value: 2024-11-20.acacia
      - key: STRIPE_MOCK_MODE
        value: 'false'
      - key: SMTP_FROM
        value: noreply@sapphire.luxury
      - key: SUPPORT_EMAIL
        value: support@sapphire.luxury
      - key: SALES_EMAIL
        value: sales@sapphire.luxury
      - key: CHANNEL_MOCK_MODE
        value: 'false'
      # Secrets: à renseigner manuellement dans le dashboard Render
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SLACK_ALERT_WEBHOOK_URL
        sync: false
    autoDeploy: true
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
