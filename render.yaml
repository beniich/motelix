# Configuration pour le déploiement sur Render.com
services:
  # Base de données PostgreSQL Staging
  - type: pgo
    name: sapphire-db-staging
    plan: free # A upgrader en starter ou pro pour la production
    region: frankfurt

  # Web API Backend Node.js
  - type: web
    name: sapphire-api-staging
    env: node
    region: frankfurt
    plan: starter
    buildCommand: "cd backend && npm ci && npx prisma generate && npx prisma migrate deploy && npm run build"
    startCommand: "cd backend && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sapphire-db-staging
          property: connectionString
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "https://sapphire-staging.luxury,https://app.sapphire-staging.luxury"
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
