# =============================================================================
#  Sapphire PMS — Production Docker Compose
# =============================================================================

version: '3.9'

services:
  # ========================================================================
  # PostgreSQL Database
  # ========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: sapphire-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sapphire
      POSTGRES_USER: sapphire
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sapphire"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sapphire-net

  # ========================================================================
  # Backend API
  # ========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sapphire-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://sapphire:${DB_PASSWORD:-changeme}@postgres:5432/sapphire
      JWT_SECRET: ${JWT_SECRET}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY}
      PII_ENCRYPTION_SALT: ${PII_ENCRYPTION_SALT:-sapphire-pii-v1}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_MOCK_MODE: ${STRIPE_MOCK_MODE:-false}
      FRONTEND_URL: ${FRONTEND_URL}
      APP_URL: ${APP_URL}
      CORS_ORIGIN: ${FRONTEND_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SMTP_FROM: ${SMTP_FROM}
      SENTRY_DSN: ${SENTRY_DSN}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sapphire-net

  # ========================================================================
  # Frontend (Next.js)
  # ========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: sapphire-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_NAME: Sapphire
    ports:
      - "3000:3000"
    networks:
      - sapphire-net

  # ========================================================================
  # Nginx (Reverse Proxy + SSL)
  # ========================================================================
  nginx:
    image: nginx:alpine
    container_name: sapphire-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    networks:
      - sapphire-net

volumes:
  postgres-data:
    driver: local
  nginx-cache:
    driver: local

networks:
  sapphire-net:
    driver: bridge
